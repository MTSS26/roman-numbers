name: Java CI

on:
  push:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # Verify that the source code can be compiled before running later stages.
      - name: Compile project
        run: mvn -B compile --file pom.xml

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # Run the unit test suite separately, so test failures are easy to identify.
      - name: Run unit tests
        run: mvn -B test --file pom.xml

  quality:
    name: Static analysis and package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # Package the project and execute Checkstyle, which is bound to the Maven package phase.
      - name: Run package and static analysis
        run: mvn -B package --file pom.xml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # Generate the JaCoCo report and enforce the required minimum coverage.
      - name: Run coverage verification
        run: mvn -B verify --file pom.xml

      - name: Publish coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: target/site/jacoco/jacoco.xml
          format: jacoco
